name: kanban
description: Cross-platform kanban board with automatic WebDAV sync.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  uuid: ^4.5.1
  webdav_client: ^1.0.9
  intl: ^0.19.0
  image_picker: ^1.1.2
  file_picker: ^10.3.11
  image: ^4.5.4
  pasteboard: ^0.4.0
  reorderables: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
